<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="ad.size" content="width=320,height=480">
    <title>Pikacheck Ad</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 320px;
            height: 480px;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fff;
            cursor: pointer;
        }

        #ad-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: #ffffff;
            border: 1px solid #d2d2d7;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Changed from center to move up */
            text-align: center;
            padding: 30px 30px 0 30px; /* Reduced top padding to move higher */
        }

        .logo-container {
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeIn 0.8s ease-out forwards 0.2s;
        }

        .logo {
            width: 90px; /* Slightly larger for 320x480 */
            height: auto;
        }

        .headline {
            color: #1d1d1f;
            font-size: 24px; /* Larger font */
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 15px;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.8s ease-out forwards 0.5s;
        }

        .subtitle {
            color: #86868b;
            font-size: 16px; /* Larger font */
            margin-bottom: 40px;
            line-height: 1.5;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.8s ease-out forwards 0.8s;
        }

        .cta-btn {
            background-color: #5a50f3;
            color: white;
            padding: 14px 32px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            opacity: 0;
            transform: scale(0.8);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 1.1s;
            box-shadow: 0 6px 16px rgba(90, 80, 243, 0.3);
        }

        /* Animations */
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes popIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        #click-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
        }
    </style>
    <script type="text/javascript">
        var clickTag = "https://app.pikacheck.com"; 
    </script>
</head>
<body>
    <div id="ad-container">
        <a href="javascript:window.open(window.clickTag)" id="click-area"></a>
        <div class="logo-container">
            <img src="Pikacheck-logo-alt-nobg.svg" alt="Pikacheck" class="logo">
        </div>
        <div class="headline">Gérez votre collection Pokémon</div>
        <div class="subtitle">Suivi de prix & Scanner<br>Gratuit sur iOS & Android</div>
        <div class="cta-btn">Télécharger l'App</div>
    </div>
</body>
</html>
