<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="ad.size" content="width=300,height=250">
    <title>Pikacheck Ad</title>
    <!-- Google Fonts are generally allowed, but using system fonts is safer for file size and strict validation. 
         I'll use system fonts that look similar to Montserrat. -->
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 300px;
            height: 250px;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fff;
            cursor: pointer;
        }

        #ad-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: #ffffff;
            border: 1px solid #d2d2d7; /* Subtle border */
            box-sizing: border-box;
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 20px;
        }

        .logo-container {
            margin-bottom: 15px;
            opacity: 0;
            animation: fadeIn 0.8s ease-out forwards 0.2s;
        }

        .logo {
            width: 60px;
            height: auto;
        }

        .headline {
            color: #1d1d1f;
            font-size: 18px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 8px;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.8s ease-out forwards 0.5s;
        }

        .subtitle {
            color: #86868b;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.4;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.8s ease-out forwards 0.8s;
        }

        .cta-btn {
            background-color: #5a50f3;
            color: white;
            padding: 10px 24px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            opacity: 0;
            transform: scale(0.8);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 1.1s;
            box-shadow: 0 4px 12px rgba(90, 80, 243, 0.3);
        }

        /* Animations */
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes popIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Click Area */
        #click-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
        }
    </style>
    <script type="text/javascript">
        var clickTag = "https://app.pikacheck.com"; 
    </script>
</head>
<body>
    <div id="ad-container">
        <a href="javascript:window.open(window.clickTag)" id="click-area"></a>
        <div class="content">
            <div class="logo-container">
                <img src="Pikacheck-logo-alt-nobg.svg" alt="Pikacheck" class="logo">
            </div>
            <div class="headline">Gérez votre collection Pokémon</div>
            <div class="subtitle">Suivi de prix & Scanner<br>Gratuit sur iOS & Android</div>
            <div class="cta-btn">Télécharger</div>
        </div>
    </div>
</body>
</html>
